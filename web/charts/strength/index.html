<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strength Chart — 6-handed</title>
  <style>
    :root { --bg: #ffffff; --ink: #1a1a1a; --muted: #555; --border: #bbb; --seat: #f2f2f2; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      background: #fff;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px 12px 40px;
    }
    h1 { margin: 0 0 2px; font-size: 20px; letter-spacing: .5px; }
    .sub { margin: 0 0 14px; color: var(--muted); font-size: 13px; text-align: center; }

    .chartnav { display: flex; gap: 8px; margin-bottom: 14px; }
    .chartnav a {
      text-decoration: none; font-size: 13px; font-weight: 700; color: #444;
      background: #f2f2f2; border: 1px solid #ccc; border-radius: 20px; padding: 7px 16px;
    }
    .chartnav a.active { background: #333; color: #fff; border-color: #333; }
    .chartnav a:hover { border-color: #888; }

    .seatsel { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center; }
    .seatsel button {
      background: var(--seat); color: var(--ink);
      border: 1px solid var(--border); border-radius: 9px;
      padding: 8px 12px; font-weight: 700; font-size: 13px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; line-height: 1.15;
    }
    .seatsel button .opp { font-size: 10px; color: var(--muted); font-weight: 600; }
    .seatsel button.active { background: #333; color: #fff; border-color: #333; }
    .seatsel button.active .opp { color: #ccc; }

    .grid {
      display: grid; grid-template-columns: repeat(13, minmax(0, 1fr));
      gap: 2px; width: min(96vw, 700px);
    }
    .cell {
      aspect-ratio: 1 / 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; border-radius: 4px;
      line-height: 1.05; color: #111;
    }
    .cell .lab { font-weight: 800; font-size: clamp(8px, 1.5vw, 12px); }
    .cell .pct { font-weight: 600; font-size: clamp(7px, 1.25vw, 10px); opacity: .92; }
    .cell .odds { font-weight: 600; font-size: clamp(6px, 1vw, 9px); opacity: .75; }
    .cell.in  { box-shadow: inset 0 0 0 2px #000; }   /* selected hands: black outline */
    .cell.fav { box-shadow: inset 0 0 0 2px #595959; }/* >50% but filtered out: dark-gray outline */

    .legend { margin-top: 18px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .bar { width: min(80vw, 360px); height: 14px; border-radius: 7px; border: 1px solid var(--border); }
    .bar-labels { width: min(80vw, 360px); display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }

    .rules { margin-top: 22px; width: min(96vw, 700px); }
    .rules .ctl { display: flex; align-items: center; gap: 10px; justify-content: center; flex-wrap: wrap; font-size: 13px; color: var(--muted); }
    .rules input[type=range] { width: min(60vw, 320px); accent-color: #555; }
    .rules .thr { color: #000; font-weight: 800; font-size: 15px; min-width: 46px; text-align: right; }
    .rules .out {
      margin-top: 12px; background: #f7f7f7; border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px; text-align: center;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 14px;
      color: #111; word-break: break-word; line-height: 1.6;
    }
    .rules .meta2 { margin-top: 6px; font-size: 12px; color: var(--muted); text-align: center; }

    /* ---- print / all-seats layout (one chart per page) ---- */
    body.printing { padding: 0; }
    .page { width: 7.3in; margin: 0 auto; padding: 16px 0 18px; }
    .page .grid { width: 100%; }
    .page-title { text-align: center; font-size: 19px; font-weight: 800; line-height: 1.3; margin-bottom: 10px; }
    .page-title span { display: block; font-weight: 500; font-size: 12.5px; color: #555; }
    .page-range { margin-top: 12px; font-size: 12px; color: #222; }
    .page-range code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      .page { page-break-after: always; }
      .page:last-child { page-break-after: auto; }
      @page { size: letter; margin: 0.4in; }
    }
  </style>
</head>
<body>
  <nav class="chartnav">
    <a href="index.html" class="active">Hand strength</a>
    <a href="vs-range.html">Equity vs range</a>
  </nav>
  <h1>Strength Chart</h1>
  <p class="sub">P(your hand is best at showdown) — 6-handed, assuming everyone ahead of you folded</p>

  <div class="seatsel" id="seatSel"></div>
  <div class="grid" id="grid"></div>

  <div class="legend">
    <div class="bar-labels" style="margin-bottom:4px"><span>P(strongest) — color, scaled to this seat's min–max</span></div>
    <div class="bar" id="bar"></div>
    <div class="bar-labels" id="barLabels"></div>
  </div>

  <div class="rules">
    <div class="ctl">
      Top <span class="thr" id="thrVal">20%</span> of hands by win%
      <input type="range" id="thr" min="0" max="100" step="1" value="20" />
    </div>
    <div class="out" id="rulesOut">—</div>
    <div class="meta2" id="rulesMeta"></div>
  </div>

  <script src="data.js"></script>
  <script>
    const R = "AKQJT98765432".split("");
    const SEATS = window.STRENGTH.meta.seats;     // [{name,opponents}, ...]
    const BY = window.STRENGTH.bySeat;
    let current = "SB";                           // default seat
    let topPct = 0.20;                            // select the strongest X% of hands (by combos)
    const RR = "AKQJT98765432";
    const comboCount = (h) => (h.length === 2 ? 6 : h.endsWith("s") ? 4 : 12);

    // strongest hands (by win%) making up the top `pct` of all 1326 combos
    function selectTop(P, pct) {
      const target = pct * 1326;
      const hands = Object.keys(P).sort((a, b) => P[b] - P[a]);
      const set = new Set(); let combos = 0, cutoff = null;
      for (const h of hands) {
        if (combos >= target) break;
        set.add(h); combos += comboCount(h); cutoff = h;
      }
      return { set, combos, cutoff };
    }

    // probability -> gambler's odds. underdog "X:1" (against), favorite "1:X" (for)
    function oddsStr(p) {
      if (p <= 0 || p >= 1) return "";
      const fmt = (x) => x.toFixed(1);
      return p < 0.5 ? `${fmt((1 - p) / p)}:1` : `1:${fmt(p / (1 - p))}`;
    }

    // color heatmap: blue (weak) -> teal -> yellow (strong)
    const STOPS = [[0.00, [44, 105, 176]], [0.50, [120, 198, 178]], [1.00, [250, 221, 80]]];
    function heatRGB(t) {
      t = Math.max(0, Math.min(1, t));
      for (let k = 1; k < STOPS.length; k++) {
        if (t <= STOPS[k][0]) {
          const [t0, a] = STOPS[k - 1], [t1, b] = STOPS[k];
          const f = (t - t0) / (t1 - t0);
          return a.map((v, i) => Math.round(v + f * (b[i] - v)));
        }
      }
      return STOPS.at(-1)[1];
    }
    const rgbStr = (c) => `rgb(${c[0]},${c[1]},${c[2]})`;
    const lum = (c) => 0.299 * c[0] + 0.587 * c[1] + 0.114 * c[2];
    const mixWhite = (c, f) => c.map((v) => Math.round(v + (255 - v) * f));

    // the 169 cells for one seat — identical markup used on screen and in print
    function cellsHTML(P, lo, hi, sel) {
      const norm = (p) => (p - lo) / (hi - lo);
      let html = "";
      for (let r = 0; r < 13; r++) {
        for (let c = 0; c < 13; c++) {
          const label = r === c ? R[r] + R[r] : (r < c ? R[r] + R[c] + "s" : R[c] + R[r] + "o");
          const p = P[label];
          const inSet = sel.set.has(label);
          const fav = !inSet && p > 0.5;
          let rgb = heatRGB(norm(p));
          if (!inSet) rgb = mixWhite(rgb, 0.5);        // fade non-playable hands
          const fg = lum(rgb) < 145 ? "#fff" : "#111"; // readable text on the cell color
          const cls = inSet ? " in" : (fav ? " fav" : "");
          html += `<div class="cell${cls}" style="background:${rgbStr(rgb)};color:${fg}" title="${label}: ${(p * 100).toFixed(1)}%  (${oddsStr(p)})">
            <span class="lab">${label}</span><span class="pct">${(p * 100).toFixed(0)}%</span><span class="odds">${oddsStr(p)}</span></div>`;
        }
      }
      return html;
    }

    function renderSeats() {
      document.getElementById("seatSel").innerHTML = SEATS.map((s) =>
        `<button data-seat="${s.name}" class="${s.name === current ? "active" : ""}">
           ${s.name}<span class="opp">vs ${s.opponents}</span></button>`
      ).join("");
    }

    function render() {
      const P = BY[current];
      const vals = Object.values(P);
      const lo = Math.min(...vals), hi = Math.max(...vals);    // scale to this seat's min/max
      const sel = selectTop(P, topPct);
      document.getElementById("grid").innerHTML = cellsHTML(P, lo, hi, sel);

      // legend: gradient (log axis) + % ticks at evenly-spaced log positions
      const stopsCss = STOPS.map(([t, c]) => `rgb(${c.join(",")}) ${(t * 100).toFixed(0)}%`).join(",");
      document.getElementById("bar").style.background = `linear-gradient(90deg, ${stopsCss})`;
      const ticks = [0, 0.25, 0.5, 0.75, 1].map((t) => lo + t * (hi - lo));  // this seat's range
      document.getElementById("barLabels").innerHTML =
        ticks.map((v) => `<span>${(v * 100).toFixed(0)}%</span>`).join("");

      updateRules(P, sel);
    }

    // ---- compress a set of hands into compact range notation (e.g. "77+, A2s+, KTo+") ----
    function runs(asc) {                            // asc: ascending rank indices -> [start,end] runs
      const res = [];
      for (let i = 0; i < asc.length;) {
        let j = i;
        while (j + 1 < asc.length && asc[j + 1] === asc[j] + 1) j++;
        res.push([asc[i], asc[j]]); i = j + 1;
      }
      return res;
    }
    function compress(set) {
      const out = [];
      const pr = [];
      for (let i = 0; i < 13; i++) if (set.has(RR[i] + RR[i])) pr.push(i);
      for (const [a, b] of runs(pr)) {
        if (a === 0) out.push(`${RR[b]}${RR[b]}+`);
        else if (a === b) out.push(`${RR[a]}${RR[a]}`);
        else out.push(`${RR[b]}${RR[b]}-${RR[a]}${RR[a]}`);
      }
      for (const suit of ["s", "o"]) {
        for (let h = 0; h < 13; h++) {
          const ks = [];
          for (let k = h + 1; k < 13; k++) if (set.has(RR[h] + RR[k] + suit)) ks.push(k);
          for (const [a, b] of runs(ks)) {
            if (a === h + 1) out.push(`${RR[h]}${RR[b]}${suit}+`);          // includes the connector
            else if (a === b) out.push(`${RR[h]}${RR[a]}${suit}`);
            else out.push(`${RR[h]}${RR[b]}${suit}-${RR[h]}${RR[a]}${suit}`);
          }
        }
      }
      return out.join(", ");
    }
    function updateRules(P, sel) {
      const { set, combos, cutoff } = sel;
      document.getElementById("rulesOut").textContent = set.size ? compress(set) : "(no hands)";
      const cut = cutoff ? `${cutoff} (${(P[cutoff] * 100).toFixed(0)}%, ${oddsStr(P[cutoff])})` : "—";
      document.getElementById("rulesMeta").textContent =
        `${set.size} classes · ${combos} combos · ${(combos / 1326 * 100).toFixed(1)}% of hands · down to ${cut}`;
    }

    // ---- print mode: ?print=1&top=NN  -> all seats, one per page, identical styling ----
    function renderPrint() {
      const tp = Math.round(topPct * 100);
      let html = "";
      for (const s of SEATS) {
        const P = BY[s.name];
        const vals = Object.values(P);
        const lo = Math.min(...vals), hi = Math.max(...vals);
        const sel = selectTop(P, topPct);
        const pctOf = (sel.combos / 1326 * 100).toFixed(1);
        const rng = sel.set.size ? compress(sel.set) : "(none)";
        html += `<section class="page">
          <div class="page-title">Strength Chart: ${s.name}
            <span>P(best at showdown) · 6-handed, folded to you · vs ${s.opponents} · top ${tp}% outlined</span></div>
          <div class="grid">${cellsHTML(P, lo, hi, sel)}</div>
          <div class="page-range"><b>Top ${tp}% range</b> (${sel.set.size} classes, ${sel.combos} combos, ${pctOf}% of hands):<br>
            <code>${rng}</code></div>
        </section>`;
      }
      document.body.innerHTML = html;
      document.body.classList.add("printing");
    }

    const params = new URLSearchParams(location.search);
    if (params.get("top")) topPct = (+params.get("top")) / 100;
    if (params.get("seat")) current = params.get("seat");

    if (params.has("print")) {
      renderPrint();
    } else {
      document.getElementById("seatSel").addEventListener("click", (e) => {
        const b = e.target.closest("button"); if (!b) return;
        current = b.dataset.seat;
        renderSeats(); render();
      });
      document.getElementById("thr").addEventListener("input", (e) => {
        topPct = +e.target.value / 100;
        document.getElementById("thrVal").textContent = e.target.value + "%";
        render();
      });
      document.getElementById("thr").value = Math.round(topPct * 100);
      document.getElementById("thrVal").textContent = Math.round(topPct * 100) + "%";
      renderSeats();
      render();
    }
  </script>
</body>
</html>
