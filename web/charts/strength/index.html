<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strength Chart — 6-handed</title>
  <style>
    :root { --bg: #0f1419; --ink: #e8eef2; --muted: #8aa0ad; --gold: #d4af37; --border: #2c3a48; --seat: #1b2530; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      background: radial-gradient(circle at 50% 0%, #18222e, var(--bg));
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px 12px 40px;
    }
    h1 { margin: 0 0 2px; font-size: 20px; letter-spacing: .5px; }
    .sub { margin: 0 0 14px; color: var(--muted); font-size: 13px; text-align: center; }

    .seatsel { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center; }
    .seatsel button {
      background: var(--seat); color: var(--ink);
      border: 1px solid var(--border); border-radius: 9px;
      padding: 8px 12px; font-weight: 700; font-size: 13px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; line-height: 1.15;
    }
    .seatsel button .opp { font-size: 10px; color: var(--muted); font-weight: 600; }
    .seatsel button.active { background: var(--gold); color: #1a1205; border-color: var(--gold); }
    .seatsel button.active .opp { color: #5a4a12; }

    .grid {
      display: grid; grid-template-columns: repeat(13, minmax(0, 1fr));
      gap: 2px; width: min(96vw, 700px);
    }
    .cell {
      aspect-ratio: 1 / 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; border-radius: 4px;
      line-height: 1.05; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.6);
    }
    .cell .lab { font-weight: 800; font-size: clamp(8px, 1.5vw, 12px); }
    .cell .pct { font-weight: 600; font-size: clamp(7px, 1.25vw, 10px); opacity: .92; }
    .cell .odds { font-weight: 600; font-size: clamp(6px, 1vw, 9px); opacity: .72; }

    .legend { margin-top: 18px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .bar { width: min(80vw, 360px); height: 14px; border-radius: 7px; border: 1px solid var(--border); }
    .bar-labels { width: min(80vw, 360px); display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }

    .cell.in { box-shadow: inset 0 0 0 2px #fff; }

    .rules { margin-top: 22px; width: min(96vw, 700px); }
    .rules .ctl { display: flex; align-items: center; gap: 10px; justify-content: center; flex-wrap: wrap; font-size: 13px; color: var(--muted); }
    .rules input[type=range] { width: min(60vw, 320px); accent-color: var(--gold); }
    .rules .thr { color: var(--gold); font-weight: 800; font-size: 15px; min-width: 46px; text-align: right; }
    .rules .out {
      margin-top: 12px; background: #0f1820; border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px; text-align: center;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 14px;
      color: var(--ink); word-break: break-word; line-height: 1.6;
    }
    .rules .meta2 { margin-top: 6px; font-size: 12px; color: var(--muted); text-align: center; }

    /* ---- printer-friendly: white paper, black ink, no heavy fills ---- */
    @media print {
      body { background: #fff !important; color: #000; padding: 6px; }
      h1, .sub, .meta2, .bar-labels, .thr { color: #000 !important; }
      .cell {
        background: #fff !important; color: #000 !important;
        text-shadow: none !important; border: 1px solid #999;
      }
      .cell .pct, .cell .odds { opacity: 1; }
      .cell.in { box-shadow: inset 0 0 0 2px #000 !important; }   /* selected hands: bold outline */
      .seatsel button { background: #fff !important; color: #000 !important; border: 1px solid #000; }
      .seatsel button.active { box-shadow: inset 0 0 0 2px #000; font-weight: 900; }
      .bar, input[type=range] { display: none; }                 /* color gradient + slider: useless on paper */
      .rules .out { background: #fff !important; color: #000 !important; border: 1px solid #000; }
    }
  </style>
</head>
<body>
  <h1>Strength Chart</h1>
  <p class="sub">P(your hand is best at showdown) — 6-handed, assuming everyone ahead of you folded</p>

  <div class="seatsel" id="seatSel"></div>
  <div class="grid" id="grid"></div>

  <div class="legend">
    <div class="bar-labels" style="margin-bottom:4px"><span>P(strongest) — linear color, 0–100% (common scale)</span></div>
    <div class="bar" id="bar"></div>
    <div class="bar-labels" id="barLabels"></div>
  </div>

  <div class="rules">
    <div class="ctl">
      Hands down to <span class="thr" id="thrVal">2:1</span> to be best
      <input type="range" id="thr" min="0.5" max="12" step="0.5" value="2" />
    </div>
    <div class="out" id="rulesOut">—</div>
    <div class="meta2" id="rulesMeta"></div>
  </div>

  <script src="data.js"></script>
  <script>
    const R = "AKQJT98765432".split("");
    const SEATS = window.STRENGTH.meta.seats;     // [{name,opponents}, ...]
    const BY = window.STRENGTH.bySeat;
    let current = SEATS[0].name;                  // default UTG
    let oddsThresh = 2;                           // include hands at least this good (X:1 to be best)
    const RR = "AKQJT98765432";
    const comboCount = (h) => (h.length === 2 ? 6 : h.endsWith("s") ? 4 : 12);

    // every hand whose displayed (rounded) odds to be best are X:1 or better
    function selectByOdds(P, x) {
      const set = new Set(); let combos = 0, cutoff = null, cutP = 2;
      for (const h of Object.keys(P)) {
        const oddsAgainst = Math.round((1 - P[h]) / P[h]);   // same value shown on the cell
        if (oddsAgainst <= x) {
          set.add(h); combos += comboCount(h);
          if (P[h] < cutP) { cutP = P[h]; cutoff = h; }
        }
      }
      return { set, combos, cutoff };
    }

    // probability -> gambler's odds. underdog "X:1" (against), favorite "1:X" (for)
    function oddsStr(p) {
      if (p <= 0 || p >= 1) return "";
      const fmt = (x) => Math.round(x).toString();
      return p < 0.5 ? `${fmt((1 - p) / p)}:1` : `1:${fmt(p / (1 - p))}`;
    }

    // blue -> light teal (bright mid) -> yellow
    const STOPS = [
      [0.00, [25, 50, 110]], [0.25, [45, 120, 185]],
      [0.50, [120, 200, 190]], [0.75, [190, 215, 110]], [1.00, [250, 225, 55]],
    ];
    function heat(t) {
      t = Math.max(0, Math.min(1, t));
      for (let k = 1; k < STOPS.length; k++) {
        if (t <= STOPS[k][0]) {
          const [t0, a] = STOPS[k - 1], [t1, b] = STOPS[k];
          const f = (t - t0) / (t1 - t0);
          const c = a.map((v, i) => Math.round(v + f * (b[i] - v)));
          return `rgb(${c[0]},${c[1]},${c[2]})`;
        }
      }
      return `rgb(${STOPS.at(-1)[1].join(",")})`;
    }

    function renderSeats() {
      document.getElementById("seatSel").innerHTML = SEATS.map((s) =>
        `<button data-seat="${s.name}" class="${s.name === current ? "active" : ""}">
           ${s.name}<span class="opp">vs ${s.opponents}</span></button>`
      ).join("");
    }

    function render() {
      const P = BY[current];
      const norm = (p) => p;                                   // linear, fixed 0-100% (common to all seats)
      const sel = selectByOdds(P, oddsThresh);

      let html = "";
      for (let r = 0; r < 13; r++) {
        for (let c = 0; c < 13; c++) {
          let label;
          if (r === c) label = R[r] + R[c];
          else if (r < c) label = R[r] + R[c] + "s";
          else label = R[c] + R[r] + "o";
          const p = P[label];
          const inSet = sel.set.has(label) ? " in" : "";
          html += `<div class="cell${inSet}" style="background:${heat(norm(p))}" title="${label}: ${(p * 100).toFixed(1)}%  (${oddsStr(p)})">
            <span class="lab">${label}</span><span class="pct">${(p * 100).toFixed(0)}%</span><span class="odds">${oddsStr(p)}</span></div>`;
        }
      }
      document.getElementById("grid").innerHTML = html;

      // legend: gradient (log axis) + % ticks at evenly-spaced log positions
      const stopsCss = STOPS.map(([t, c]) => `rgb(${c.join(",")}) ${(t * 100).toFixed(0)}%`).join(",");
      document.getElementById("bar").style.background = `linear-gradient(90deg, ${stopsCss})`;
      const ticks = [0, 0.25, 0.5, 0.75, 1];      // fixed 0-100% scale, common to every seat
      document.getElementById("barLabels").innerHTML =
        ticks.map((v) => `<span>${(v * 100).toFixed(0)}%</span>`).join("");

      updateRules(P, sel);
    }

    // ---- compress a set of hands into compact range notation (e.g. "77+, A2s+, KTo+") ----
    function runs(asc) {                            // asc: ascending rank indices -> [start,end] runs
      const res = [];
      for (let i = 0; i < asc.length;) {
        let j = i;
        while (j + 1 < asc.length && asc[j + 1] === asc[j] + 1) j++;
        res.push([asc[i], asc[j]]); i = j + 1;
      }
      return res;
    }
    function compress(set) {
      const out = [];
      const pr = [];
      for (let i = 0; i < 13; i++) if (set.has(RR[i] + RR[i])) pr.push(i);
      for (const [a, b] of runs(pr)) {
        if (a === 0) out.push(`${RR[b]}${RR[b]}+`);
        else if (a === b) out.push(`${RR[a]}${RR[a]}`);
        else out.push(`${RR[b]}${RR[b]}-${RR[a]}${RR[a]}`);
      }
      for (const suit of ["s", "o"]) {
        for (let h = 0; h < 13; h++) {
          const ks = [];
          for (let k = h + 1; k < 13; k++) if (set.has(RR[h] + RR[k] + suit)) ks.push(k);
          for (const [a, b] of runs(ks)) {
            if (a === h + 1) out.push(`${RR[h]}${RR[b]}${suit}+`);          // includes the connector
            else if (a === b) out.push(`${RR[h]}${RR[a]}${suit}`);
            else out.push(`${RR[h]}${RR[b]}${suit}-${RR[h]}${RR[a]}${suit}`);
          }
        }
      }
      return out.join(", ");
    }
    function updateRules(P, sel) {
      const { set, combos, cutoff } = sel;
      document.getElementById("rulesOut").textContent = set.size ? compress(set) : "(no hands)";
      const cut = cutoff ? `${cutoff} (${(P[cutoff] * 100).toFixed(0)}%, ${oddsStr(P[cutoff])})` : "—";
      document.getElementById("rulesMeta").textContent =
        `${set.size} classes · ${combos} combos · ${(combos / 1326 * 100).toFixed(1)}% of hands · down to ${cut}`;
    }

    document.getElementById("seatSel").addEventListener("click", (e) => {
      const b = e.target.closest("button"); if (!b) return;
      current = b.dataset.seat;
      renderSeats(); render();
    });

    document.getElementById("thr").addEventListener("input", (e) => {
      oddsThresh = +e.target.value;
      document.getElementById("thrVal").textContent = e.target.value + ":1";
      render();
    });

    renderSeats();
    render();
  </script>
</body>
</html>
