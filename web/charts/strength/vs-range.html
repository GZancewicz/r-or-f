<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equity vs Opponent Range — heads-up</title>
  <style>
    :root { --ink: #1a1a1a; --muted: #555; --border: #bbb; --seat: #f2f2f2; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: #fff; color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; flex-direction: column; align-items: center; padding: 20px 12px 40px;
    }
    h1 { margin: 0 0 2px; font-size: 20px; letter-spacing: .5px; }
    .sub { margin: 0 0 16px; color: var(--muted); font-size: 13px; text-align: center; }

    .chartnav { display: flex; gap: 8px; margin-bottom: 14px; }
    .chartnav a {
      text-decoration: none; font-size: 13px; font-weight: 700; color: #444;
      background: #f2f2f2; border: 1px solid #ccc; border-radius: 20px; padding: 7px 16px;
    }
    .chartnav a.active { background: #333; color: #fff; border-color: #333; }
    .chartnav a:hover { border-color: #888; }

    .ctl { display: flex; align-items: center; gap: 10px; justify-content: center; flex-wrap: wrap; font-size: 14px; margin-bottom: 6px; }
    .ctl .thr { color: #000; font-weight: 800; font-size: 16px; min-width: 48px; text-align: right; }
    .seg { display: inline-flex; gap: 6px; }
    .seg button {
      background: #f2f2f2; border: 1px solid #ccc; border-radius: 8px;
      padding: 6px 13px; font-weight: 700; font-size: 14px; cursor: pointer; color: #333;
    }
    .seg button.active { background: #333; color: #fff; border-color: #333; }
    .seg button:hover { border-color: #888; }
    .opp-range { font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 16px;
                 max-width: min(96vw, 700px); }
    .opp-range code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: #333; }

    .grid { display: grid; grid-template-columns: repeat(13, minmax(0, 1fr)); gap: 2px; width: min(96vw, 700px); }
    .cell {
      aspect-ratio: 1 / 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      border-radius: 4px; line-height: 1.05; color: #111;
    }
    .cell .lab { font-weight: 800; font-size: clamp(8px, 1.5vw, 12px); }
    .cell .pct { font-weight: 700; font-size: clamp(7px, 1.3vw, 11px); margin-top: 1px; }
    .cell .odds { font-weight: 600; font-size: clamp(6px, 1vw, 9px); opacity: .8; }
    .cell.in { box-shadow: inset 0 0 0 2px #000; }   /* hand is in the opponent's range */

    .legend { margin-top: 18px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .bar { width: min(80vw, 360px); height: 14px; border-radius: 7px; border: 1px solid var(--border); }
    .bar-labels { width: min(80vw, 360px); display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }
  </style>
</head>
<body>
  <nav class="chartnav">
    <a href="index.html">Hand strength</a>
    <a href="vs-range.html" class="active">Equity vs range</a>
  </nav>
  <h1>Equity vs Opponent's Range</h1>
  <p class="sub">Heads-up (you on the SB) — your win% / odds at showdown if the opponent is on the top X% of hands</p>

  <div class="ctl">
    Opponent plays top <span class="seg" id="oppSeg"></span> of hands
  </div>
  <div class="opp-range" id="oppRange"></div>

  <div class="grid" id="grid"></div>

  <div class="legend">
    <div class="bar-labels" style="margin-bottom:4px"><span>your equity — color, scaled to this view's min&ndash;max</span></div>
    <div class="bar" id="bar"></div>
    <div class="bar-labels" id="barLabels"></div>
  </div>

  <script src="equity.js"></script>
  <script>
    const R = "AKQJT98765432".split("");
    const RR = "AKQJT98765432";
    const { hands, w, M } = window.EQ;
    const IX = Object.fromEntries(hands.map((h, i) => [h, i]));
    const COMBOS = (h) => (h.length === 2 ? 6 : h.endsWith("s") ? 4 : 12);
    const OPP_OPTIONS = [10, 15, 20, 25, 30];       // selectable opponent range widths (%)
    let oppPct = 0.15;                              // opponent range width (fraction)

    // opponent hand strength = equity vs a random hand; used to rank their range
    const oppStr = hands.map((_, i) => {
      let n = 0, d = 0;
      for (let j = 0; j < 169; j++) { n += w[j] * M[i][j]; d += w[j]; }
      return n / d;
    });
    const oppOrder = [...hands.keys()].sort((a, b) => oppStr[b] - oppStr[a]);

    function oppRangeSet(pct) {                      // top pct of opponent hands, by combos
      const target = pct * 1326;
      const set = new Set(); let combos = 0;
      for (const j of oppOrder) {
        if (combos >= target) break;
        set.add(j); combos += w[j];
      }
      return set;
    }
    function equityVs(hero, set) {                   // hero's equity vs the range
      let n = 0, d = 0;
      for (const j of set) { n += w[j] * M[hero][j]; d += w[j]; }
      return d > 0 ? n / d : 0;
    }
    function oddsStr(p) {
      if (p <= 0 || p >= 1) return "";
      const f = (x) => x.toFixed(1);
      return p < 0.5 ? `${f((1 - p) / p)}:1` : `1:${f(p / (1 - p))}`;
    }
    // color heatmap: blue (low equity) -> teal -> yellow (high equity)
    const STOPS = [[0.00, [44, 105, 176]], [0.50, [120, 198, 178]], [1.00, [250, 221, 80]]];
    function heatRGB(t) {
      t = Math.max(0, Math.min(1, t));
      for (let k = 1; k < STOPS.length; k++) {
        if (t <= STOPS[k][0]) {
          const [t0, a] = STOPS[k - 1], [t1, b] = STOPS[k];
          const f = (t - t0) / (t1 - t0);
          return a.map((v, i) => Math.round(v + f * (b[i] - v)));
        }
      }
      return STOPS.at(-1)[1];
    }
    const rgbStr = (c) => `rgb(${c[0]},${c[1]},${c[2]})`;
    const lum = (c) => 0.299 * c[0] + 0.587 * c[1] + 0.114 * c[2];

    // compact range notation for the opponent's range
    function runs(asc) { const r = []; for (let i = 0; i < asc.length;) { let j = i; while (j + 1 < asc.length && asc[j + 1] === asc[j] + 1) j++; r.push([asc[i], asc[j]]); i = j + 1; } return r; }
    function compress(labelSet) {
      const out = [], s = labelSet;
      const pr = []; for (let i = 0; i < 13; i++) if (s.has(RR[i] + RR[i])) pr.push(i);
      for (const [a, b] of runs(pr)) out.push(a === 0 ? `${RR[b]}${RR[b]}+` : (a === b ? `${RR[a]}${RR[a]}` : `${RR[b]}${RR[b]}-${RR[a]}${RR[a]}`));
      for (const suit of ["s", "o"]) for (let h = 0; h < 13; h++) {
        const ks = []; for (let k = h + 1; k < 13; k++) if (s.has(RR[h] + RR[k] + suit)) ks.push(k);
        for (const [a, b] of runs(ks)) out.push(a === h + 1 ? `${RR[h]}${RR[b]}${suit}+` : (a === b ? `${RR[h]}${RR[a]}${suit}` : `${RR[h]}${RR[b]}${suit}-${RR[h]}${RR[a]}${suit}`));
      }
      return out.join(", ");
    }

    function render() {
      const set = oppRangeSet(oppPct);
      const labelSet = new Set([...set].map((j) => hands[j]));   // hands in opponent's range

      // hero equities for all 169 hands, find min/max for the color scale
      const eq = {};
      for (const h of hands) eq[h] = equityVs(IX[h], set);
      const vals = Object.values(eq);
      const lo = Math.min(...vals), hi = Math.max(...vals);
      const norm = (p) => (hi > lo ? (p - lo) / (hi - lo) : 0.5);

      let html = "";
      for (let r = 0; r < 13; r++) {
        for (let c = 0; c < 13; c++) {
          const label = r === c ? R[r] + R[r] : (r < c ? R[r] + R[c] + "s" : R[c] + R[r] + "o");
          const e = eq[label];
          const rgb = heatRGB(norm(e));
          const fg = lum(rgb) < 145 ? "#fff" : "#111";
          const inOpp = labelSet.has(label) ? " in" : "";   // hand is in opponent's range
          html += `<div class="cell${inOpp}" style="background:${rgbStr(rgb)};color:${fg}" title="${label} vs top ${Math.round(oppPct * 100)}%: ${(e * 100).toFixed(1)}% (${oddsStr(e)})">
            <span class="lab">${label}</span><span class="pct">${(e * 100).toFixed(0)}%</span><span class="odds">${oddsStr(e)}</span></div>`;
        }
      }
      document.getElementById("grid").innerHTML = html;

      // opponent range readout
      let combos = 0; set.forEach((j) => combos += w[j]);
      document.getElementById("oppRange").innerHTML =
        `Opponent's range (top ${Math.round(oppPct * 100)}%, ${combos} combos): <code>${compress(labelSet)}</code>`;

      // legend
      const bar = document.getElementById("bar");
      const stopsCss = STOPS.map(([t, c]) => `rgb(${c.join(",")}) ${(t * 100).toFixed(0)}%`).join(",");
      bar.style.background = `linear-gradient(90deg, ${stopsCss})`;
      const ticks = [0, 0.25, 0.5, 0.75, 1].map((t) => lo + t * (hi - lo));
      document.getElementById("barLabels").innerHTML = ticks.map((v) => `<span>${(v * 100).toFixed(0)}%</span>`).join("");
    }

    function renderOppSel() {
      document.getElementById("oppSeg").innerHTML = OPP_OPTIONS.map(
        (p) => `<button data-p="${p}" class="${Math.round(oppPct * 100) === p ? "active" : ""}">${p}%</button>`
      ).join("");
    }
    document.getElementById("oppSeg").addEventListener("click", (e) => {
      const b = e.target.closest("button"); if (!b) return;
      oppPct = +b.dataset.p / 100;
      renderOppSel(); render();
    });

    renderOppSel();
    render();
  </script>
</body>
</html>
